# News ingestion. Per-ticker headlines come from Yahoo Finance RSS (template below);
# sector feeds cover the data-center/semis theme broadly. All feeds are best-effort:
# a failing feed logs a warning and is skipped.

per_ticker:
  enabled: true
  url_template: "https://feeds.finance.yahoo.com/rss/2.0/headline?s={ticker}&region=US&lang=en-US"

sector_feeds:
  - {name: datacenterknowledge, url: "https://www.datacenterknowledge.com/rss.xml"}
  - {name: semiengineering, url: "https://semiengineering.com/feed/"}
